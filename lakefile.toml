name = "gap-lean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["GapLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "GapLean"

# GAP-free tests (parser round-trips, marshaling, adversarial certificates):
#   lake build GapLeanTests
[[lean_lib]]
name = "GapLeanTests"
